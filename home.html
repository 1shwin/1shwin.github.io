<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ashwin Hari</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="home.css">
    <script src="theme.js"></script>
    <script src="home.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to My Desk</h1>
        <h2>Click on the items below to navigate</h2>
    </header>
    <main class="home-desk">
        <nav class="home-desk-top">
            <div class="home-desk-item home-item-photos">
                <a class="home-photos-model" href="./about.html" aria-label="About">
                    <div class="frame-outer">
                        <div class="frame-inner">
                            <div class="frame-content">
                                <img src="/images/frame.jpg" alt="Picture">
                            </div>
                        </div>
                    </div>
                </a>
            </div>
            <div class="home-desk-item home-item-laptop">
                <a class="home-laptop-model" href="./projects.html" aria-label="Projects">
                    <div class="lid">
                        <div class="screen">
                            <span id="prompt">>>></span>
                            <span id="onscreen-text"></span>
                        </div>
                    </div>
                    <div class="base">
                        <div class="keyboard"></div>
                        <div class="trackpad"></div>
                    </div>
                </a>
            </div>
            <div class="home-desk-item home-item-papers">
                <a class="home-papers-model" href="./research.html" aria-label="Research">
                    <div class="top-page"></div>
                </a>
            </div>
            <div class="home-desk-item home-item-idcard">
                <a class="home-idcard-model" href="./contact.html" aria-label="Contact">
                    <div class="card-background">
                        <div class="card-photo">
                            <img src="/images/pfp.jpg" alt="Face">
                        </div>
                        <div class="card-name">
                            Ashwin Hari
                        </div>
                    </div>
                </a>
            </div>
        </nav>
    </main>
    <div class="floating-controls">
        <button class="floating-button" aria-label="Toggle dark/light mode" id="theme-toggle-btn">
            <svg class="theme-icon icon-sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="True">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="theme-icon icon-moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="True">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </div>
</body>
</html>
